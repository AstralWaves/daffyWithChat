<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daffy Chat - Video Call</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/call-style.css">
</head>
<body class="call-body">
    <div class="video-call-container">
        <!-- Remote Video (Full Screen) -->
        <video id="remoteVideo" autoplay playsinline class="remote-video"></video>
        
        <!-- Local Video (Picture in Picture) -->
        <div class="local-video-wrapper">
            <video id="localVideo" autoplay playsinline muted class="local-video"></video>
            <div class="user-label">You</div>
        </div>

        <!-- Call Overlay Info -->
        <div class="call-overlay">
            <div class="participant-info">
                <img id="peerAvatar" src="../assets/default-avatar.png" class="call-avatar" alt="Avatar">
                <div class="participant-details">
                    <h2 id="peerName">Connecting...</h2>
                    <span id="callStatus" class="status-badge">Secure Connection</span>
                </div>
            </div>
            <div class="call-timer" id="callTimer">00:00</div>
        </div>

        <!-- Controls Bar -->
        <div class="call-controls-bar">
            <button id="toggleMic" class="control-btn" title="Toggle Microphone">
                <span class="icon">🎤</span>
            </button>
            <button id="toggleVideo" class="control-btn" title="Toggle Camera">
                <span class="icon">📹</span>
            </button>
            <button id="screenShare" class="control-btn" title="Share Screen">
                <span class="icon">🖥️</span>
            </button>
            <button id="endCall" class="control-btn end-call" title="End Call">
                <span class="icon">📞</span>
            </button>
        </div>
    </div>

    <!-- Incoming Call Notification (Hidden by default) -->
    <div id="incomingCallModal" class="modal" style="display: none;">
        <div class="modal-content call-notification">
            <img id="callerAvatar" src="../assets/default-avatar.png" class="avatar-large" alt="Avatar">
            <h3 id="callerName">Incoming Call...</h3>
            <div class="call-actions">
                <button id="acceptCall" class="btn-call accept">Accept</button>
                <button id="declineCall" class="btn-call decline">Decline</button>
            </div>
        </div>
    </div>

    <script src="../js/utils/helpers.js"></script>
    <script src="../js/calls/video-call.js"></script>
    <script>
        // Check authentication
        if (!localStorage.getItem('access_token')) {
            window.location.href = 'login.html';
        }

        // Initialize call based on URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const callId = urlParams.get('id');
        const isCaller = urlParams.get('caller') === 'true';

        if (callId) {
            currentCallId = callId;
            if (isCaller) {
                startVideoCall();
            } else {
                connectSignaling();
            }
        }
    </script>
</body>
</html>
